name: hearwithme
description: 'Real-Time Offline Audio & Media Sharing P2P Network for Commuters'
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^9.1.1
  bloc: ^9.0.0
  rxdart: ^0.28.0
  equatable: ^2.0.7

  # Dependency Injection
  get_it: ^8.0.3
  injectable: ^2.5.0

  # Routing
  go_router: ^15.1.2

  # Serialization & Immutability
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Identity
  uuid: ^4.5.1
  shared_preferences: ^2.3.5

  # UI & Design
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  lucide_icons_flutter: ^1.1.5

  # Cupertino (for iOS style)
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code Generation
  build_runner: ^2.4.14
  freezed: ^3.0.0
  json_serializable: ^6.9.4
  injectable_generator: ^2.7.0

  # Linting
  very_good_analysis: ^7.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
